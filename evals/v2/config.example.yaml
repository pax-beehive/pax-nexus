version: v2
run:
  id: groupmembench-finance-v2-deepseek-v4-flash
  dataset: GroupMemBench
  manifest: runs/groupmembench-v2-selection/manifest.json
  output_dir: runs/eval-v2/groupmembench-finance-v2-deepseek-v4-flash
  parallelism: 4
store:
  dsn_env: EVAL_V2_POSTGRES_DSN
baseline_arm: control
retry_failed: false
trial_timeout: 8m
runtime_env:
  - OPENCODE_MODEL
  - OPENCODE_VERSION
  - EVAL_V2_JUDGE_MODEL
  - EVAL_V2_JUDGE_THINKING
  - TEAM_MEMORY_EXTRACTOR_MODEL
  - TEAM_MEMORY_PROMPT_VERSION
  - TEAM_MEMORY_EXTRACTION_CONTEXT_MODE
  - TEAM_MEMORY_EXTRACTION_VERSION
  - TEAM_MEMORY_EXTRACTION_COMPACTION_ENABLED
  - TEAM_MEMORY_EXTRACTION_SUMMARY_ENABLED
  - TEAM_MEMORY_EXTRACTION_SUMMARY_TRIGGER_TOKENS
  - TEAM_MEMORY_EXTRACTION_SUMMARY_TAIL_TOKENS
  - TEAM_MEMORY_EXTRACTION_COMPACT_START_TOKENS
  - TEAM_MEMORY_EXTRACTION_COMPACT_TOKENS
  - MEM0_IMAGE
  - MEM0_DEFAULT_LLM_MODEL
  - MEM0_DEEPSEEK_BASE_URL
  - MEM0_DEFAULT_EMBEDDER_MODEL
  - MEM0_EVAL_USER_ID
  - MEM0_EVAL_AGENT_ID
  - PAXM_PASSIVE_MIN_RELEVANCE
  - PAXM_PASSIVE_MIN_SCORE
  - PAXM_PASSIVE_PROVIDER_TIMEOUT
  - MEM0_SCORE_SEMANTICS
  - MEM0_SEARCH_SCOPE_PAYLOAD
  - PAXM_EXPECTED_VERSION
  - PAXM_INSERTION_MIN_SCORE
  - PAXM_EVAL_DIAGNOSTICS
output:
  formats: [csv, jsonl, html]
stage_capture:
  fixtures: evals/stage/groupmembench-finance-10.json
  arms: [team_note, team_note_hybrid]
preflight:
  program: scripts/eval-v2-opencode.sh
  args: [preflight, all]
judge:
  program: scripts/eval-v2-judge.sh
arms:
  - name: direct_context
    consumer:
      program: scripts/eval-v2-opencode.sh
      args: [consumer, direct_context]
  - name: control
    consumer:
      program: scripts/eval-v2-opencode.sh
      args: [consumer, control]
  - name: team_note
    ingest:
      program: scripts/eval-v2-opencode.sh
      args: [ingest, team_note]
    after_producer:
      program: scripts/eval-v2-opencode.sh
      args: [ready, team_note]
    consumer:
      program: scripts/eval-v2-opencode.sh
      args: [consumer, team_note]
  - name: team_note_hybrid
    ingest:
      program: scripts/eval-v2-opencode.sh
      args: [ingest, team_note_hybrid]
    after_producer:
      program: scripts/eval-v2-opencode.sh
      args: [ready, team_note_hybrid]
    consumer:
      program: scripts/eval-v2-opencode.sh
      args: [consumer, team_note_hybrid]
  - name: mem0
    ingest:
      program: scripts/eval-v2-opencode.sh
      args: [ingest, mem0]
    after_producer:
      program: scripts/eval-v2-opencode.sh
      args: [ready, mem0]
    consumer:
      program: scripts/eval-v2-opencode.sh
      args: [consumer, mem0]
