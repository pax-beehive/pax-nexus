services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: team_memory
      POSTGRES_USER: team_memory
      POSTGRES_PASSWORD: team_memory
    ports:
      - "${EVAL_V2_POSTGRES_PORT:-55433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U team_memory -d team_memory"]
      interval: 1s
      timeout: 3s
      retries: 30
    volumes:
      - eval-v2-postgres:/var/lib/postgresql/data

  team-memory:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      TEAM_MEMORY_DATABASE_URL: postgres://team_memory:team_memory@postgres:5432/team_memory?sslmode=disable
      TEAM_MEMORY_API_KEYS: '${TEAM_MEMORY_API_KEYS:?TEAM_MEMORY_API_KEYS is required}'
      TEAM_MEMORY_EXTRACTOR_MODE: ${TEAM_MEMORY_EXTRACTOR_MODE:-openai}
      TEAM_MEMORY_EXTRACTOR_BASE_URL: ${TEAM_MEMORY_EXTRACTOR_BASE_URL:-https://api.deepseek.com}
      TEAM_MEMORY_EXTRACTOR_API_KEY: ${TEAM_MEMORY_EXTRACTOR_API_KEY:?TEAM_MEMORY_EXTRACTOR_API_KEY is required}
      TEAM_MEMORY_EXTRACTOR_MODEL: ${TEAM_MEMORY_EXTRACTOR_MODEL:-deepseek-v4-flash}
      TEAM_MEMORY_PROMPT_VERSION: ${TEAM_MEMORY_PROMPT_VERSION:-v1}
      TEAM_MEMORY_EXTRACTION_CONTEXT_MODE: ${TEAM_MEMORY_EXTRACTION_CONTEXT_MODE:-rolling}
      TEAM_MEMORY_EXTRACTION_VERSION: ${TEAM_MEMORY_EXTRACTION_VERSION:-v2}
      TEAM_MEMORY_EXTRACTION_CANDIDATE_STRATEGY: ${TEAM_MEMORY_EXTRACTION_CANDIDATE_STRATEGY:-}
      TEAM_MEMORY_EXTRACTION_COMPACTION_ENABLED: ${TEAM_MEMORY_EXTRACTION_COMPACTION_ENABLED:-false}
      TEAM_MEMORY_EXTRACTION_SUMMARY_ENABLED: ${TEAM_MEMORY_EXTRACTION_SUMMARY_ENABLED:-true}
      TEAM_MEMORY_EXTRACTION_SUMMARY_TRIGGER_TOKENS: ${TEAM_MEMORY_EXTRACTION_SUMMARY_TRIGGER_TOKENS:-8192}
      TEAM_MEMORY_EXTRACTION_SUMMARY_TAIL_TOKENS: ${TEAM_MEMORY_EXTRACTION_SUMMARY_TAIL_TOKENS:-16384}
      TEAM_MEMORY_EXTRACTION_COMPACT_START_TOKENS: ${TEAM_MEMORY_EXTRACTION_COMPACT_START_TOKENS:-12288}
      TEAM_MEMORY_EXTRACTION_COMPACT_TOKENS: ${TEAM_MEMORY_EXTRACTION_COMPACT_TOKENS:-16384}
      TEAM_MEMORY_WORKER_SHARDS: ${TEAM_MEMORY_WORKER_SHARDS:-16}
      TEAM_MEMORY_WORKER_JOB_TIMEOUT: ${TEAM_MEMORY_WORKER_JOB_TIMEOUT:-2m}
      TEAM_MEMORY_EMBEDDING_BASE_URL: ${TEAM_MEMORY_EMBEDDING_BASE_URL-http://qwen-embedding:8080}
      TEAM_MEMORY_EMBEDDING_MODEL: ${TEAM_MEMORY_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      TEAM_MEMORY_EMBEDDING_TIMEOUT: ${TEAM_MEMORY_EMBEDDING_TIMEOUT:-10s}
      TEAM_MEMORY_SEMANTIC_THRESHOLD: ${TEAM_MEMORY_SEMANTIC_THRESHOLD:-0.50}
      TEAM_MEMORY_HINT_SEMANTIC_THRESHOLD: ${TEAM_MEMORY_HINT_SEMANTIC_THRESHOLD:-0.50}
      TEAM_MEMORY_RETRIEVAL_CANDIDATE_LIMIT: ${TEAM_MEMORY_RETRIEVAL_CANDIDATE_LIMIT:-16}
      TEAM_MEMORY_HINT_RECALL_ENABLED: "false"
      TEAM_MEMORY_HINT_THRESHOLD: ${TEAM_MEMORY_HINT_THRESHOLD:-0.65}
    depends_on:
      postgres:
        condition: service_healthy

  team-memory-hint:
    profiles: [hint-recall]
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      TEAM_MEMORY_DATABASE_URL: postgres://team_memory:team_memory@postgres:5432/team_memory?sslmode=disable
      TEAM_MEMORY_API_KEYS: '${TEAM_MEMORY_API_KEYS:?TEAM_MEMORY_API_KEYS is required}'
      TEAM_MEMORY_EXTRACTOR_MODE: noop
      TEAM_MEMORY_EMBEDDING_BASE_URL: ${TEAM_MEMORY_EMBEDDING_BASE_URL-http://qwen-embedding:8080}
      TEAM_MEMORY_EMBEDDING_MODEL: ${TEAM_MEMORY_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      TEAM_MEMORY_EMBEDDING_TIMEOUT: ${TEAM_MEMORY_EMBEDDING_TIMEOUT:-10s}
      TEAM_MEMORY_SEMANTIC_THRESHOLD: ${TEAM_MEMORY_SEMANTIC_THRESHOLD:-0.50}
      TEAM_MEMORY_HINT_SEMANTIC_THRESHOLD: ${TEAM_MEMORY_HINT_SEMANTIC_THRESHOLD:-0.20}
      TEAM_MEMORY_RETRIEVAL_CANDIDATE_LIMIT: ${TEAM_MEMORY_RETRIEVAL_CANDIDATE_LIMIT:-16}
      TEAM_MEMORY_HINT_RECALL_ENABLED: "true"
      TEAM_MEMORY_HINT_THRESHOLD: ${TEAM_MEMORY_HINT_THRESHOLD:-0.60}
    depends_on:
      postgres:
        condition: service_healthy
      qwen-embedding:
        condition: service_healthy

  qwen-embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --hf-repo
      - Qwen/Qwen3-Embedding-0.6B-GGUF:Q8_0
      - --embedding
      - --pooling
      - last
      - --alias
      - Qwen/Qwen3-Embedding-0.6B
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "512"
    environment:
      LLAMA_CACHE: /models
    volumes:
      - eval-v2-qwen-cache:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 120

  mem0-postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MEM0_POSTGRES_PASSWORD:-mem0-eval-password}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d postgres -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - eval-v2-mem0-postgres:/var/lib/postgresql/data
      - ./mem0-init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  mem0:
    image: ${MEM0_EVAL_IMAGE:-pax-nexus-mem0-eval:local}
    build:
      context: ../..
      dockerfile: evals/v2/docker/mem0/Dockerfile
      args:
        MEM0_BASE_IMAGE: ${MEM0_IMAGE:-mem0/mem0-api-server@sha256:2fcf4bb713cfc584d454bf06993cc7e2fe51540695995bd3aa9c7008b7065c75}
    environment:
      OPENAI_API_KEY: ${MEM0_OPENAI_API_KEY:?MEM0_OPENAI_API_KEY is required}
      POSTGRES_HOST: mem0-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MEM0_POSTGRES_PASSWORD:-mem0-eval-password}
      POSTGRES_COLLECTION_NAME: memories
      APP_DB_NAME: mem0_app
      JWT_SECRET: ${MEM0_JWT_SECRET:-eval-only-jwt-secret-change-me}
      AUTH_DISABLED: "true"
      MEM0_TELEMETRY: "false"
      MEM0_DEFAULT_LLM_MODEL: ${MEM0_DEFAULT_LLM_MODEL:-deepseek-v4-flash}
      MEM0_DEEPSEEK_BASE_URL: ${MEM0_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      MEM0_DEFAULT_EMBEDDER_MODEL: ${MEM0_DEFAULT_EMBEDDER_MODEL:-text-embedding-3-small}
    volumes:
      - eval-v2-mem0-history:/app/history
    depends_on:
      mem0-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=2)"]
      interval: 2s
      timeout: 3s
      retries: 30

  mem0-configure:
    build:
      context: ../..
      dockerfile: evals/v2/docker/mem0-configure/Dockerfile
    environment:
      MEM0_CONFIGURE_URL: http://mem0:8000/configure
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      MEM0_OPENAI_API_KEY: ${MEM0_OPENAI_API_KEY:?MEM0_OPENAI_API_KEY is required}
      MEM0_DEFAULT_LLM_MODEL: ${MEM0_DEFAULT_LLM_MODEL:-deepseek-v4-flash}
      MEM0_DEEPSEEK_BASE_URL: ${MEM0_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      MEM0_DEFAULT_EMBEDDER_MODEL: ${MEM0_DEFAULT_EMBEDDER_MODEL:-text-embedding-3-small}
      POSTGRES_HOST: mem0-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MEM0_POSTGRES_PASSWORD:-mem0-eval-password}
      POSTGRES_COLLECTION_NAME: memories
    depends_on:
      mem0:
        condition: service_healthy

  opencode:
    build:
      context: ../..
      dockerfile: evals/opencode/docker/opencode/Dockerfile
      additional_contexts:
        paxm: ${PAXM_SOURCE_DIR:?PAXM_SOURCE_DIR is required}
      args:
        OPENCODE_VERSION: ${OPENCODE_VERSION:-1.17.20}
        PAXM_VERSION: ${PAXM_EXPECTED_VERSION:-v0.1.29}
    environment:
      OPENCODE_MODEL: ${OPENCODE_MODEL:?OPENCODE_MODEL is required}
      PAXM_EXPECTED_VERSION: ${PAXM_EXPECTED_VERSION:-v0.1.29}
      PAXM_EVAL_DIAGNOSTICS: ${PAXM_EVAL_DIAGNOSTICS:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      - team-memory
      - mem0

volumes:
  eval-v2-postgres:
  eval-v2-qwen-cache:
  eval-v2-mem0-postgres:
  eval-v2-mem0-history:
