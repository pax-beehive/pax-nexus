services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: team_memory
      POSTGRES_USER: team_memory
      POSTGRES_PASSWORD: team_memory
    ports:
      - "${TEAM_MEMORY_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U team_memory -d team_memory"]
      interval: 1s
      timeout: 3s
      retries: 30
    volumes:
      - team-memory-postgres:/var/lib/postgresql/data

  team-memory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRACTION_CANDIDATE_STRATEGY: ${TEAM_MEMORY_BUILD_EXTRACTION_CANDIDATE_STRATEGY:-current}
    environment:
      TEAM_MEMORY_DATABASE_URL: postgres://team_memory:team_memory@postgres:5432/team_memory?sslmode=disable
      TEAM_MEMORY_API_KEYS: '${TEAM_MEMORY_API_KEYS:-{"local-team-key":"local-team"}}'
      TEAM_MEMORY_EXTRACTOR_MODE: ${TEAM_MEMORY_EXTRACTOR_MODE:-openai}
      TEAM_MEMORY_EXTRACTOR_BASE_URL: ${TEAM_MEMORY_EXTRACTOR_BASE_URL:-https://api.deepseek.com}
      TEAM_MEMORY_EXTRACTOR_API_KEY: ${TEAM_MEMORY_EXTRACTOR_API_KEY:-}
      TEAM_MEMORY_EXTRACTOR_MODEL: ${TEAM_MEMORY_EXTRACTOR_MODEL:-deepseek-v4-flash}
      TEAM_MEMORY_PROMPT_VERSION: ${TEAM_MEMORY_PROMPT_VERSION:-v2-rolling}
      TEAM_MEMORY_EXTRACTION_CONTEXT_MODE: ${TEAM_MEMORY_EXTRACTION_CONTEXT_MODE:-rolling}
      TEAM_MEMORY_EXTRACTION_VERSION: ${TEAM_MEMORY_EXTRACTION_VERSION:-v2}
      TEAM_MEMORY_EXTRACTION_CANDIDATE_STRATEGY: ${TEAM_MEMORY_EXTRACTION_CANDIDATE_STRATEGY:-}
      TEAM_MEMORY_EXTRACTION_COMPACTION_ENABLED: ${TEAM_MEMORY_EXTRACTION_COMPACTION_ENABLED:-false}
      TEAM_MEMORY_EXTRACTION_SUMMARY_ENABLED: ${TEAM_MEMORY_EXTRACTION_SUMMARY_ENABLED:-true}
      TEAM_MEMORY_EXTRACTION_SUMMARY_TRIGGER_TOKENS: ${TEAM_MEMORY_EXTRACTION_SUMMARY_TRIGGER_TOKENS:-8192}
      TEAM_MEMORY_EXTRACTION_SUMMARY_TAIL_TOKENS: ${TEAM_MEMORY_EXTRACTION_SUMMARY_TAIL_TOKENS:-16384}
      TEAM_MEMORY_EXTRACTION_COMPACT_START_TOKENS: ${TEAM_MEMORY_EXTRACTION_COMPACT_START_TOKENS:-12288}
      TEAM_MEMORY_EXTRACTION_COMPACT_TOKENS: ${TEAM_MEMORY_EXTRACTION_COMPACT_TOKENS:-16384}
      TEAM_MEMORY_WORKER_SHARDS: ${TEAM_MEMORY_WORKER_SHARDS:-16}
      TEAM_MEMORY_WORKER_MAX_ATTEMPTS: ${TEAM_MEMORY_WORKER_MAX_ATTEMPTS:-5}
      TEAM_MEMORY_WORKER_DEBOUNCE: ${TEAM_MEMORY_WORKER_DEBOUNCE:-750ms}
      TEAM_MEMORY_BATCH_TIMEOUT: ${TEAM_MEMORY_BATCH_TIMEOUT:-30s}
      TEAM_MEMORY_WORKER_JOB_TIMEOUT: ${TEAM_MEMORY_WORKER_JOB_TIMEOUT:-2m}
      TEAM_MEMORY_WORKER_STOP_TIMEOUT: ${TEAM_MEMORY_WORKER_STOP_TIMEOUT:-30s}
      TEAM_MEMORY_SLICE_EVENT_LIMIT: ${TEAM_MEMORY_SLICE_EVENT_LIMIT:-25}
      TEAM_MEMORY_SLICE_TOKEN_LIMIT: ${TEAM_MEMORY_SLICE_TOKEN_LIMIT:-8192}
      TEAM_MEMORY_SLICE_OVERLAP: ${TEAM_MEMORY_SLICE_OVERLAP:-3}
      TEAM_MEMORY_MAX_SLICES_PER_JOB: ${TEAM_MEMORY_MAX_SLICES_PER_JOB:-4}
      TEAM_MEMORY_EMBEDDING_BASE_URL: ${TEAM_MEMORY_EMBEDDING_BASE_URL-http://qwen-embedding:8080}
      TEAM_MEMORY_EMBEDDING_MODEL: ${TEAM_MEMORY_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      TEAM_MEMORY_EMBEDDING_TIMEOUT: ${TEAM_MEMORY_EMBEDDING_TIMEOUT:-10s}
      TEAM_MEMORY_SEMANTIC_THRESHOLD: ${TEAM_MEMORY_SEMANTIC_THRESHOLD:-0.50}
      TEAM_MEMORY_HINT_SEMANTIC_THRESHOLD: ${TEAM_MEMORY_HINT_SEMANTIC_THRESHOLD:-0.50}
      TEAM_MEMORY_RETRIEVAL_CANDIDATE_LIMIT: ${TEAM_MEMORY_RETRIEVAL_CANDIDATE_LIMIT:-16}
      TEAM_MEMORY_HINT_RECALL_ENABLED: ${TEAM_MEMORY_HINT_RECALL_ENABLED:-false}
      TEAM_MEMORY_HINT_THRESHOLD: ${TEAM_MEMORY_HINT_THRESHOLD:-0.65}
    ports:
      - "${TEAM_MEMORY_HTTP_PORT:-58080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  qwen-embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --hf-repo
      - Qwen/Qwen3-Embedding-0.6B-GGUF:Q8_0
      - --embedding
      - --pooling
      - last
      - --alias
      - Qwen/Qwen3-Embedding-0.6B
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "512"
    environment:
      LLAMA_CACHE: /models
    volumes:
      - team-memory-qwen-cache:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 120
    restart: unless-stopped

volumes:
  team-memory-postgres:
  team-memory-qwen-cache:
