version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - cyclop
    - errcheck
    - errorlint
    - gocognit
    - nilerr
    - testifylint
    - unused
  settings:
    cyclop:
      max-complexity: 20
    gocognit:
      min-complexity: 26
    errcheck:
      check-type-assertions: true
      check-blank: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
